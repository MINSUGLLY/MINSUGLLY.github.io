<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Loading…</title>
    <meta name="description" content="" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="stylesheet" href="/assets/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <nav class="topbar">
      <a class="topbar-name" href="/" data-bind="name_en"></a>
      <div class="topbar-nav" data-bind="nav"></div>
    </nav>
    <main>
      <header class="profile">
        <img
          class="profile-photo"
          data-bind-src="photo"
          alt=""
          aria-hidden="true"
        />
        <div class="profile-info">
          <h1 data-bind="name"></h1>
          <nav
            class="social-links"
            data-bind="links"
            aria-label="Social links"
          ></nav>
          <p class="cv-line">
            <a
              class="cv-link"
              data-bind-href="cv"
              target="_blank"
              rel="noopener noreferrer"
              >[CV]</a
            >
          </p>
        </div>
      </header>

      <section id="about">
        <h2>About</h2>
        <div data-bind="about"></div>
      </section>

      <section id="experience">
        <h2>Experience</h2>
        <ul class="experience" data-bind="experience"></ul>
      </section>

      <section id="publications">
        <h2>Publications</h2>
        <ul class="publications" data-bind="publications"></ul>
      </section>
    </main>
    <footer>
      <p>&copy; <span data-bind="year"></span> <span data-bind="name"></span></p>
    </footer>
    <script src="/assets/main.js" defer></script>
  </body>
</html>
